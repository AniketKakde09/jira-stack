apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: jira
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --default-authentication-plugin=mysql_native_password
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpass
            - name: MYSQL_DATABASE
              value: jira
            - name: MYSQL_USER
              value: jira
            - name: MYSQL_PASSWORD
              value: jira
          ports:
            - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: jira
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
