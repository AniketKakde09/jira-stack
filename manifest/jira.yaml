apiVersion: v1
kind: Namespace
metadata:
  name: jira
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jira
  namespace: jira
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jira
  template:
    metadata:
      labels:
        app: jira
    spec:
      containers:
        - name: jira
          image: atlassian/jira-software:latest
          ports:
            - containerPort: 8080
          env:
            - name: ATL_JDBC_URL
              value: ""
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: jira
  namespace: jira
spec:
  type: NodePort
  selector:
    app: jira
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007
